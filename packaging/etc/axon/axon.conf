# axon configuration
# Edit this file and restart the service: systemctl restart axon
#
# For runtime changes, use the CLI: axon --help

# gRPC socket path (daemon ↔ CLI)
GRPC_ADDR="unix:///run/axon/daemon.sock"

# TCP log server address (JSON lines streamed to connected clients)
# Change with: axon log-endpoint <host:port>
# Default: 127.0.0.1:5000
LOG_ADDR="127.0.0.1:5000"

# Path to compiled eBPF object
BPF_OBJ="/usr/lib/axon/xdp_firewall.o"

# Database path (bbolt)
DB_PATH="/var/lib/axon/db.bolt"

# DNS refresh interval (e.g., 30s, 1m, 2m)
DNS_INTERVAL="30s"

# Custom DNS nameserver (leave empty to use system resolver)
# Example: NAMESERVER="8.8.8.8:53"
NAMESERVER=""

# Default firewall mode: allow-all or block-all
# allow-all = lists act as blocklist (default)
# block-all = lists act as allowlist
MODE="allow-all"
